<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econodo</title>
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>
   <header class="header">
        <h1>Monitoreo Ambiental</h1>
        
        <div class="info">
            <p>Fecha: <span id="fecha"></span></p>
            <p>Hora: <span id="hora"></span></p>
            <p>Estado del dispositivo: <span id="estado">Activo</span></p>
        </div>
    </header>

    <div class="contenedor">
        <nav class="navegacion">
            <a href="index.html"><img src="src/img/panel.png" alt="IconoDasboard">Dashboard</a>
            <a href="historial.html"><img src="src/img/reloj.png" alt="IconoHistorial">Historial</a>
            <a href="alertas.html"><img src="src/img/peligro.png" alt="IconoAlertas">Alertas</a>
            <a href="configuracion.html"><img src="src/img/engranaje.png" alt="IconoDasboard">Configuración</a>
        </nav>

        <main class="contenedor-ajustes">
             <h1 class="texto">⚙️ Configuración</h1>

            <!-- 🌡️ UMBRALES -->
            <div class="card-ajustes">
                <h2>🌡️ Umbrales</h2>

                <div class="grupo">
                <label>Temperatura máxima (°C)</label>
                <input type="number" placeholder="35">
                </div>

                <div class="grupo">
                <label>Humedad mínima (%)</label>
                <input type="number" placeholder="20">
                </div>

                <div class="grupo">
                <label>Presión mínima</label>
                <input type="number" placeholder="950">
                </div>

                <div class="grupo">
                <label>Calidad de aire máxima (AQI)</label>
                <input type="number" placeholder="150">
                </div>
            </div>

            <!-- 🔔 ALERTAS -->
            <div class="card-ajustes">
                <h2>🔔 Alertas</h2>

                <div class="grupo horizontal">
                <label>Activar sonido</label>
                <input type="checkbox">
                </div>

                <div class="grupo horizontal">
                <label>Alertar solo si dura (segundos)</label>
                <input type="number" placeholder="10">
                </div>

                <div class="grupo">
                <label>Tipos de alerta</label>
                <div class="checkboxes">
                    <label><input type="checkbox" checked> Temperatura</label>
                    <label><input type="checkbox" checked> Humedad</label>
                    <label><input type="checkbox" checked> Presión</label>
                    <label><input type="checkbox" checked> Aire</label>
                </div>
                </div>
            </div>

            <!-- 📊 HISTORIAL -->
            <div class="card-ajustes">
                <h2>📊 Historial</h2>

                <div class="grupo">
                <label>Guardar datos cada (minutos)</label>
                <input type="number" placeholder="5">
                </div>

                <div class="grupo">
                <label>Eliminar datos después de (días)</label>
                <input type="number" placeholder="30">
                </div>

                <button class="btn-secundario">📥 Descargar historial</button>
            </div>

            <!-- 📡 DISPOSITIVO -->
            <div class="card-ajustes">
                <h2>📡 Dispositivo</h2>

                <div class="grupo">
                <label>IP del dispositivo</label>
                <input type="text" placeholder="192.168.1.10">
                </div>

                <div class="grupo">
                <label>Frecuencia de actualización (segundos)</label>
                <input type="number" placeholder="3">
                </div>

                <div class="estado">
                Estado: <span class="conectado">🟢 Conectado</span>
                </div>
            </div>

            <!-- 💾 BOTÓN -->
            <button class="btn-principal">💾 Guardar configuración</button>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
