<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoNodo — Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>
   <header class="header">
        <h1>Monitoreo Ambiental</h1>
        
        <div class="info">
            <p>Fecha: <span id="fecha"></span></p>
            <p>Hora: <span id="hora"></span></p>
            <p>Estado del dispositivo: <span id="estado">Activo</span></p>
        </div>
    </header>

    <div class="contenedor">
        <nav class="navegacion">
            <a href="index.html"><img src="src/img/panel.png" alt="Dashboard">Dashboard</a>
            <a href="historial.html"><img src="src/img/reloj.png" alt="IconoHistorial">Historial</a>
            <a href="alertas.html"><img src="src/img/peligro.png" alt="IconoAlertas">Alertas</a>
            <a href="configuracion.html"><img src="src/img/engranaje.png" alt="Configuración">Configuración</a>
        </nav>

        <main class="dashboards">

            <div class="card card--temperatura">
                <h2>🌡️ Temperatura</h2>
                <p class="card-valor" id="temperatura-valor">-- °C</p>
                <span class="estado-badge" id="temperatura-estado">—</span>
            </div>

            <div class="card card--aire">
                <h2>☣️ Calidad del Aire</h2>
                <p class="card-valor" id="aire-valor">--</p>
                <span class="estado-badge" id="aire-estado">—</span>
                <div class="aire-detalle">
                    <div class="sub-metrica">
                        <span class="sub-label">PM2.5</span>
                        <strong class="sub-valor" id="pm25-valor">--</strong>
                        <span class="sub-unidad">μg/m³</span>
                    </div>
                    <div class="sub-metrica">
                        <span class="sub-label">PM10</span>
                        <strong class="sub-valor" id="pm10-valor">--</strong>
                        <span class="sub-unidad">μg/m³</span>
                    </div>
                    <div class="sub-metrica">
                        <span class="sub-label">VOC</span>
                        <strong class="sub-valor" id="voc-valor">--</strong>
                        <span class="sub-unidad">kΩ</span>
                    </div>
                </div>
            </div>

            <div class="card card--presion">
                <h2>🧭 Presión atmosférica</h2>
                <p class="card-valor" id="presion-valor">-- hPa</p>
                <span class="estado-badge" id="presion-estado">—</span>
            </div>

            <div class="card card--humedad">
                <h2>💧 Humedad</h2>
                <p class="card-valor" id="humedad-valor">-- %</p>
                <span class="estado-badge" id="humedad-estado">—</span>
            </div>

            <p id="ultima-actualizacion" class="ultima-actualizacion">—</p>

        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
