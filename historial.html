<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econodo</title>
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>
   <header class="header">
        <h1>Monitoreo Ambiental</h1>
        
        <div class="info">
            <p>Fecha: <span id="fecha"></span></p>
            <p>Hora: <span id="hora"></span></p>
            <p>Estado del dispositivo: <span id="estado">Activo</span></p>
        </div>
    </header>

    <div class="contenedor">
        <nav class="navegacion">
           <a href="index.html"><img src="src/img/panel.png" alt="IconoDasboard">Dashboard</a>
            <a href="historial.html"><img src="src/img/reloj.png" alt="IconoHistorial">Historial</a>
            <a href="alertas.html"><img src="src/img/peligro.png" alt="IconoAlertas">Alertas</a>
            <a href="configuracion.html"><img src="src/img/engranaje.png" alt="IconoDasboard">Configuración</a>
        </nav>

        <main class="historial">
            <div class="encabezado-historial">
                <h1>📊 Historial Ambiental</h1>
            </div>

            <!-- FILTROS -->
            <div class="filtros">

                <div class="grupo">
                <label>Año</label>
                <select id="filtro-anio">
                    <option value="Todos">Todos</option>
                    <option value="2026">2026</option>
                </select>
                </div>

                <div class="grupo">
                <label>Mes</label>
                <select id="filtro-mes">
                    <option value="Todos">Todos</option>
                    <option value="01">Enero</option>
                    <option value="02">Febrero</option>
                    <option value="03">Marzo</option>
                    <option value="04">Abril</option>
                    <option value="05">Mayo</option>
                    <option value="06">Junio</option>
                    <option value="07">Julio</option>
                    <option value="08">Agosto</option>
                    <option value="09">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
                </div>

                <div class="grupo">
                <label>Día</label>
                <select id="filtro-dia">
                    <option value="Todos">Todos</option>
                </select>
                </div>

                <button class="btn-filtrar">
                Aplicar filtros
                </button>

            </div>

            <!-- GRAFICAS -->
            <div class="contenedor-graficas">

                <div class="card-grafica">
                <div class="titulo-card">
                    <h2>🌡️ Temperatura</h2>
                </div>

                <div class="grafica-wrapper">
                    <canvas id="graficaTemperatura"></canvas>
                </div>
                </div>

                <div class="card-grafica">
                <div class="titulo-card">
                    <h2>💧 Humedad</h2>
                </div>

                <div class="grafica-wrapper">
                    <canvas id="graficaHumedad"></canvas>
                </div>
                </div>

                <div class="card-grafica">
                <div class="titulo-card">
                    <h2>☣️ Calidad del Aire</h2>
                </div>

                <div class="grafica-wrapper">
                    <canvas id="graficaAire"></canvas>
                </div>
                </div>

                <div class="card-grafica">
                <div class="titulo-card">
                    <h2>🌪️ Presión Atmosférica</h2>
                </div>

                <div class="grafica-wrapper">
                    <canvas id="graficaPresion"></canvas>
                </div>
                </div>

            </div>

            
        </main>
    </div>

    <!--<script src="js/app.js"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial.js"></script>
</body>
</html>
