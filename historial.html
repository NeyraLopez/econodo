<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econodo</title>
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>
   <header class="header">
        <h1>Monitoreo Ambiental</h1>
        
        <div class="info">
            <p>Fecha: <span id="fecha"></span></p>
            <p>Hora: <span id="hora"></span></p>
            <p>Estado del dispositivo: <span id="estado">Activo</span></p>
        </div>
    </header>

    <div class="contenedor">
        <nav class="navegacion">
           <a href="index.html"><img src="src/img/panel.png" alt="IconoDasboard">Dashboard</a>
            <a href="historial.html"><img src="src/img/reloj.png" alt="IconoHistorial">Historial</a>
            <a href="alertas.html"><img src="src/img/peligro.png" alt="IconoAlertas">Alertas</a>
            <a href="configuracion.html"><img src="src/img/engranaje.png" alt="IconoDasboard">Configuración</a>
        </nav>

        <main class="historial">
            <div class="encabezado-historial">
                <h1>📊 Historial Ambiental</h1>
            </div>

            <!-- FILTROS DE PERÍODO -->
            <div class="filtros-periodo">
                <button class="btn-periodo activo" data-periodo="hoy">Hoy</button>
                <button class="btn-periodo" data-periodo="7d">7 días</button>
                <button class="btn-periodo" data-periodo="30d">30 días</button>
                <button class="btn-periodo" data-periodo="todo">Todo</button>
            </div>

            <!-- SELECTOR DE GRAFICAS -->
            <div class="selector-graficas">

                <button class="btn-grafica activo" data-grafica="temperatura">
                    🌡️ Temperatura
                </button>

                <button class="btn-grafica" data-grafica="humedad">
                    💧 Humedad
                </button>

                <button class="btn-grafica" data-grafica="aire">
                    ☣️ Aire
                </button>

                <button class="btn-grafica" data-grafica="presion">
                    🌪️ Presión
                </button>

            </div>

            <!-- ESTADO VACÍO -->
            <div id="sin-datos" class="sin-datos-card" style="display:none;">
                <div class="sin-datos-icono">📊</div>
                <h3 class="sin-datos-titulo">Sin datos para este período</h3>
                <p class="sin-datos-desc">No hay lecturas registradas en el rango seleccionado.</p>
            </div>

            <!-- GRAFICAS -->
            <div class="contenedor-graficas">

                <div class="card-grafica" id="temperatura">
                    <div class="titulo-card">
                        <h2>🌡️ Temperatura</h2>
                    </div>

                    <div class="grafica-wrapper">
                        <canvas id="graficaTemperatura"></canvas>
                    </div>
                </div>

                <div class="card-grafica" id="humedad">
                    <div class="titulo-card">
                        <h2>💧 Humedad</h2>
                    </div>

                    <div class="grafica-wrapper">
                        <canvas id="graficaHumedad"></canvas>
                    </div>
                </div>

                <div class="card-grafica" id="aire">
                    <div class="titulo-card">
                        <h2>☣️ Calidad del Aire</h2>
                    </div>

                    <div class="grafica-wrapper">
                        <canvas id="graficaAire"></canvas>
                    </div>
                </div>

                <div class="card-grafica" id="presion">
                    <div class="titulo-card">
                        <h2>🌪️ Presión Atmosférica</h2>
                    </div>

                    <div class="grafica-wrapper">
                        <canvas id="graficaPresion"></canvas>
                    </div>
                </div>

            </div>

            
        </main>
    </div>

    <!--<script src="js/app.js"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial.js"></script>
</body>
</html>
