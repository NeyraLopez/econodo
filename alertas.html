<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econodo</title>
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>
   <header class="header">
        <h1>Monitoreo Ambiental</h1>
        
        <div class="info">
            <p>Fecha: <span id="fecha"></span></p>
            <p>Hora: <span id="hora"></span></p>
            <p>Estado del dispositivo: <span id="estado">Activo</span></p>
        </div>
    </header>

    <div class="contenedor">
        <nav class="navegacion">
            <a href="index.html"><img src="src/img/panel.png" alt="IconoDasboard">Dashboard</a>
            <a href="historial.html"><img src="src/img/reloj.png" alt="IconoHistorial">Historial</a>
            <a href="alertas.html"><img src="src/img/peligro.png" alt="IconoAlertas">Alertas</a>
            <a href="configuracion.html"><img src="src/img/engranaje.png" alt="IconoDasboard">Configuración</a>
        </nav>

        <main class="alertas">

            <h2 class="alertas-titulo">⚠️ Monitor de alertas</h2>

            <div id="panel-alertas">
                <div id="sin-alertas" class="sin-alertas-card">
                    <div class="sin-alertas-icono">✅</div>
                    <h3 class="sin-alertas-titulo">Todo en orden</h3>
                    <p class="sin-alertas-desc">No hay alertas activas. Los sensores operan dentro de los rangos normales.</p>
                </div>
            </div>

        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
